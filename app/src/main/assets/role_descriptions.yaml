roles:
  - id: straight_high_priestess
    name: Straight High Priestess
    description: Knows which players belong to the REVERSED side, except roles hidden from arcane sight. Appears as an Oracle.
  - id: straight_hierophant
    name: Straight Hierophant
    description: Sees the players who appear as Oracle figures during the initial information phase.
