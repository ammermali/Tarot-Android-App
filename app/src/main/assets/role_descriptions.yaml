  - id: reversed_face_card_4
    name: Reversed Face Card
    description: A REVERSED player with no special ability.
  - id: straight_magician
    name: Straight Magician
    description: A STRAIGHT player that can cast magic. Magic will invert the result of every quest it's casted on.
  - id: reversed_magician
    name: Reversed Magician
    description: A REVERSED player that can cast magic. Magic will invert the result of every quest it's casted on. It can not play REVERSE.
  - id: straight_devil
    name: Straight Devil
    description: A STRAIGHT player that is seen as REVERSED. If the STRAIGHT players win, the REVERSED DEVIL can guess this card and convert the STRAIGHT DEVIL into a REVERSED player.
